<!-- PARTÍCULAS — esfera pentagonal + explosão supernova + antigravidade -->
<script>
(function(){
  var canvas=document.getElementById('nexo-particles');
  var ctx=canvas.getContext('2d');
  var animId=null, mouse={x:-9999,y:-9999};
  var W=canvas.width=window.innerWidth, H=canvas.height=window.innerHeight;

  // Spotlight — z-index 1003
  var sc=document.createElement('canvas');
  sc.id='nexo-spotlight'; sc.width=W; sc.height=H;
  sc.style.cssText='position:fixed;inset:0;z-index:1003;pointer-events:none;';
  document.body.appendChild(sc);
  var sctx=sc.getContext('2d');

  // Estados
  var STATE='free', hoverInt=0, gatherT=0, explodeT=0, ringAngle=0;

  // Pentágonos concêntricos: 1+5+10+15+20+25 = 76 partículas
  var layers=[{n:1,r:0},{n:5,r:22},{n:10,r:44},{n:15,r:68},{n:20,r:95},{n:25,r:128}];
  var targets=[];
  layers.forEach(function(layer,li){
    for(var i=0;i<layer.n;i++){
      var ba=(li%2===0)?0:(Math.PI/layer.n);
      targets.push({angle:ba+(i/layer.n)*Math.PI*2, radius:layer.r, layer:li});
    }
  });
  var TOTAL=targets.length;

  function makePt(i){
    var bvx=(Math.random()-0.5)*0.6, bvy=(Math.random()-0.5)*0.6;
    return {x:Math.random()*W,y:Math.random()*H,vx:bvx,vy:bvy,bvx:bvx,bvy:bvy,
            r:1.0+Math.random()*1.8,op:0.4+Math.random()*0.5,ph:Math.random()*Math.PI*2,
            ti:i,gf:0.5+Math.random()*0.5};
  }
  var pts=[];
  for(var i=0;i<TOTAL;i++) pts.push(makePt(i));

  function getLogo(){
    var el=document.querySelector('.login-card-premium img');
    if(!el) return {cx:W/2,cy:100,w:180,h:83,l:W/2-90,r:W/2+90,t:30,b:112};
    var r=el.getBoundingClientRect();
    return {cx:r.left+r.width/2,cy:r.top+r.height/2,w:r.width,h:r.height,l:r.left,r:r.right,t:r.top,b:r.bottom};
  }

  // Detecção hover via bounding box — não falha com overlays
  var wasOver=false;
  document.addEventListener('mousemove',function(e){
    mouse.x=e.clientX; mouse.y=e.clientY;
    var lc=getLogo();
    var over=(e.clientX>=lc.l&&e.clientX<=lc.r&&e.clientY>=lc.t&&e.clientY<=lc.b);
    if(over&&!wasOver){
      if(STATE==='free'||STATE==='exploding'){STATE='gathering';gatherT=0;}
    } else if(!over&&wasOver){
      if(STATE==='gathering'||STATE==='pentagon'){
        STATE='exploding'; explodeT=0;
        var lc2=getLogo();
        for(var i=0;i<pts.length;i++){
          var p=pts[i];
          var dx=p.x-lc2.cx,dy=p.y-lc2.cy,d=Math.sqrt(dx*dx+dy*dy)||1;
          var nearMult=1+Math.max(0,(1-d/60))*3;
          var power=(5+Math.random()*6)*nearMult;
          var ra=Math.atan2(dy,dx)+(Math.random()-0.5)*0.8;
          p.vx=Math.cos(ra)*power; p.vy=Math.sin(ra)*power;
        }
      }
    }
    wasOver=over;
    if(STATE==='free'){
      for(var i=0;i<pts.length;i++){
        var p=pts[i],dx=p.x-e.clientX,dy=p.y-e.clientY,d=Math.sqrt(dx*dx+dy*dy);
        if(d<110&&d>1){var rf=(1-d/110)*0.35;p.vx+=(dx/d)*rf;p.vy+=(dy/d)*rf;}
      }
    }
  });

  function drawSpot(lc){
    sctx.clearRect(0,0,W,H);
    if(hoverInt<0.01) return;
    var I=hoverInt, sR=132*I;
    var g1=sctx.createRadialGradient(lc.cx,lc.cy,0,lc.cx,lc.cy,sR*1.5);
    g1.addColorStop(0,'rgba(255,225,100,'+(0.42*I)+')');
    g1.addColorStop(0.30,'rgba(201,168,76,'+(0.28*I)+')');
    g1.addColorStop(0.65,'rgba(180,140,50,'+(0.12*I)+')');
    g1.addColorStop(1,'rgba(201,168,76,0)');
    sctx.fillStyle=g1; sctx.fillRect(0,0,W,H);
    layers.forEach(function(layer,li){
      if(layer.r===0) return;
      var op=(0.25-li*0.03)*I; if(op<=0) return;
      sctx.beginPath(); sctx.arc(lc.cx,lc.cy,layer.r+2,0,Math.PI*2);
      sctx.strokeStyle='rgba(201,168,76,'+Math.max(0,op)+')';
      sctx.lineWidth=li===1?1.2:0.6; sctx.stroke();
    });
    var pulse=0.5+0.5*Math.sin(Date.now()*0.004);
    sctx.beginPath(); sctx.arc(lc.cx,lc.cy,sR+pulse*14,0,Math.PI*2);
    sctx.strokeStyle='rgba(232,201,106,'+(0.18*I*pulse)+')';
    sctx.lineWidth=0.8; sctx.stroke();
    var g2=sctx.createRadialGradient(lc.cx,lc.cy,sR*0.6,lc.cx,lc.cy,sR*2.8);
    g2.addColorStop(0,'rgba(201,168,76,'+(0.06*I)+')'); g2.addColorStop(1,'rgba(201,168,76,0)');
    sctx.fillStyle=g2; sctx.fillRect(0,0,W,H);
  }

  function loop(){
    W=canvas.width; H=canvas.height;
    ctx.clearRect(0,0,W,H);
    var bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.75);
    bg.addColorStop(0,'#0d1928'); bg.addColorStop(0.55,'#090f1d'); bg.addColorStop(1,'#07101e');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    var lc=getLogo();
    ringAngle+=0.006;
    hoverInt+=((STATE==='gathering'||STATE==='pentagon'?1:0)-hoverInt)*0.07;
    if(STATE==='gathering'){gatherT++; if(gatherT>30)STATE='pentagon';}
    if(STATE==='exploding'){explodeT++; if(explodeT>70)STATE='free';}
    var I=hoverInt, connRange=145+I*40, connBoost=1+I*1.8;

    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      for(var j=i+1;j<pts.length;j++){
        var q=pts[j],ddx=p.x-q.x,ddy=p.y-q.y,dd=Math.sqrt(ddx*ddx+ddy*ddy);
        if(dd<connRange){
          ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
          ctx.strokeStyle='rgba(201,168,76,'+Math.min((1-dd/connRange)*0.27*connBoost,0.7)+')';
          ctx.lineWidth=0.5+I*0.25; ctx.stroke();
        }
      }
      if(STATE==='free'||STATE==='exploding'){
        var mmdx=p.x-mouse.x,mmdy=p.y-mouse.y,mmd=Math.sqrt(mmdx*mmdx+mmdy*mmdy);
        if(mmd<165){
          ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(mouse.x,mouse.y);
          ctx.strokeStyle='rgba(201,168,76,'+((1-mmd/165)*0.45)+')';
          ctx.lineWidth=0.7; ctx.stroke();
        }
      }
      p.ph+=0.013;
      var g=0.5+0.5*Math.sin(p.ph);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(1+I*0.7),0,Math.PI*2);
      ctx.fillStyle='rgba(201,168,76,'+(p.op*g*(1+I*0.6))+')'; ctx.fill();

      if(STATE==='free'){
        p.vx+=(p.bvx-p.vx)*0.009+(Math.random()-0.5)*0.008;
        p.vy+=(p.bvy-p.vy)*0.009+(Math.random()-0.5)*0.008;
        p.vx*=0.985; p.vy*=0.985;
        var spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
        if(spd>1.3){p.vx=(p.vx/spd)*1.3;p.vy=(p.vy/spd)*1.3;}
      } else if(STATE==='gathering'||STATE==='pentagon'){
        var t=targets[p.ti], tA=t.angle+ringAngle;
        var tR=t.radius*(STATE==='gathering'?Math.min(gatherT/30,1):1);
        var tx=lc.cx+Math.cos(tA)*tR, ty=lc.cy+Math.sin(tA)*tR;
        var toX=tx-p.x,toY=ty-p.y,td=Math.sqrt(toX*toX+toY*toY)||1;
        p.vx+=(toX/td)*Math.min(td*0.08,2.8); p.vy+=(toY/td)*Math.min(td*0.08,2.8);
        p.vx*=0.85; p.vy*=0.85;
        var spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
        if(spd>3.0){p.vx=(p.vx/spd)*3.0;p.vy=(p.vy/spd)*3.0;}
      } else if(STATE==='exploding'){
        p.vx*=0.975; p.vy*=0.975;
        var spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
        if(spd>18){p.vx=(p.vx/spd)*18;p.vy=(p.vy/spd)*18;}
      }
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-15)p.x=W+15; if(p.x>W+15)p.x=-15;
      if(p.y<-15)p.y=H+15; if(p.y>H+15)p.y=-15;
    }
    drawSpot(lc);
    animId=requestAnimationFrame(loop);
  }

  window.addEventListener('resize',function(){W=canvas.width=sc.width=window.innerWidth;H=canvas.height=sc.height=window.innerHeight;});

  // Polling: inicia quando login-screen ficar visível
  var pollTimer=setInterval(function(){
    var ls=document.getElementById('login-screen');
    if(ls&&(ls.style.display==='flex'||window.getComputedStyle(ls).display==='flex')){
      clearInterval(pollTimer);
      canvas.style.display='block'; sc.style.display='block';
      document.getElementById('nexo-vignette').style.display='block';
      var corn=document.getElementById('nexo-corners'); if(corn)corn.style.display='block';
      if(!animId) loop();
      var obs=new MutationObserver(function(){
        if(ls.style.display!=='flex'){
          if(animId){cancelAnimationFrame(animId);animId=null;}
          canvas.style.display='none'; sc.style.display='none';
          document.getElementById('nexo-vignette').style.display='none';
          var c=document.getElementById('nexo-corners'); if(c)c.style.display='none';
          obs.disconnect();
        }
      });
      obs.observe(ls,{attributes:true,attributeFilter:['style']});
    }
  },150);
  setTimeout(function(){clearInterval(pollTimer);},15000);

  window.NEXO_PARTICLES={
    show:function(){canvas.style.display='block';sc.style.display='block';document.getElementById('nexo-vignette').style.display='block';var c=document.getElementById('nexo-corners');if(c)c.style.display='block';if(!animId)loop();},
    stop:function(){if(animId){cancelAnimationFrame(animId);animId=null;}canvas.style.display='none';sc.style.display='none';document.getElementById('nexo-vignette').style.display='none';var c=document.getElementById('nexo-corners');if(c)c.style.display='none';}
  };
})();
</script>

<!-- LOGIN FORM HANDLER -->
<script>
(function(){
  document.addEventListener('DOMContentLoaded',function(){
    var btn=document.getElementById('btn-login');
    var err=document.getElementById('login-error');
    ['login-email','login-senha'].forEach(function(id){
      var el=document.getElementById(id);
      if(el) el.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click();});
    });
    if(btn){
      btn.addEventListener('click',async function(){
        var email=(document.getElementById('login-email').value||'').trim();
        var senha=document.getElementById('login-senha').value||'';
        if(!email||!senha){err.textContent='Preencha email e senha.';return;}
        err.textContent=''; btn.disabled=true; btn.textContent='Entrando...';
        try{await window.NEXO.auth.login(email,senha);}
        catch(e){err.textContent=e.message||'Erro ao entrar.';btn.disabled=false;btn.textContent='Entrar';}
      });
    }
    var lo=document.getElementById('btn-logout');
    if(lo) lo.addEventListener('click',function(){window.NEXO.auth.logout();});
    window.NEXO_UPDATE_USER=function(user){
      if(!user) return;
      var meta=user.user_metadata||{};
      var av=document.getElementById('sidebar-user-av');
      var nm=document.getElementById('sidebar-user-name');
      var rl=document.getElementById('sidebar-user-role');
      var nome=meta.nome||user.email||'Usuário';
      if(av)av.textContent=nome.charAt(0).toUpperCase();
      if(nm)nm.textContent=nome;
      if(rl)rl.textContent=meta.role==='super_admin'?'Super Admin':'Gestor de Rede';
    };
  });
})();
</script>

<!-- Canvas de partículas — ativo apenas na tela de login -->
<script>
(function() {
  var canvas, ctx, particles, mouse = {x:-9999,y:-9999}, animId, running = false;

  function initParticles() {
    canvas = document.getElementById('nexo-particles');
    ctx = canvas.getContext('2d');
    resize();
    buildParticles();
    animate();
    running = true;
  }

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function buildParticles() {
    particles = [];
    for (var i = 0; i < 72; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.55,
        vy: (Math.random() - 0.5) * 0.55,
        r: 1.2 + Math.random() * 2.2,
        op: 0.35 + Math.random() * 0.55,
        ph: Math.random() * Math.PI * 2
      });
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var bg = ctx.createRadialGradient(
      canvas.width/2, canvas.height/2, 0,
      canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height)*0.75
    );
    bg.addColorStop(0,    '#0d1928');
    bg.addColorStop(0.55, '#090f1d');
    bg.addColorStop(1,    '#07101e');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (var i = 0; i < particles.length; i++) {
      var a = particles[i];
      for (var j = i + 1; j < particles.length; j++) {
        var b = particles[j];
        var dx = a.x - b.x, dy = a.y - b.y;
        var d = Math.sqrt(dx*dx + dy*dy);
        if (d < 150) {
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = 'rgba(201,168,76,' + ((1 - d/150) * 0.3) + ')';
          ctx.lineWidth = 0.5; ctx.stroke();
        }
      }
      var mdx = a.x - mouse.x, mdy = a.y - mouse.y;
      var md = Math.sqrt(mdx*mdx + mdy*mdy);
      if (md < 185) {
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(mouse.x, mouse.y);
        ctx.strokeStyle = 'rgba(201,168,76,' + ((1 - md/185) * 0.58) + ')';
        ctx.lineWidth = 0.85; ctx.stroke();
      }
      a.ph += 0.013;
      var glow = 0.5 + 0.5 * Math.sin(a.ph);
      ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(201,168,76,' + (a.op * glow) + ')';
      ctx.fill();
      a.x += a.vx; a.y += a.vy;
      if (a.x < -8) a.x = canvas.width + 8;
      if (a.x > canvas.width + 8) a.x = -8;
      if (a.y < -8) a.y = canvas.height + 8;
      if (a.y > canvas.height + 8) a.y = -8;
    }
    animId = requestAnimationFrame(animate);
  }

  function stopParticles() {
    if (animId) cancelAnimationFrame(animId);
    running = false;
    var el = document.getElementById('nexo-particles');
    if (el) el.style.display = 'none';
    var vig = document.getElementById('nexo-vignette');
    if (vig) vig.style.display = 'none';
    var corn = document.getElementById('nexo-corners');
    if (corn) corn.style.display = 'none';
  }

  function showLoginEffects() {
    var pc   = document.getElementById('nexo-particles');
    var vig  = document.getElementById('nexo-vignette');
    var corn = document.getElementById('nexo-corners');
    if (pc)   pc.style.display   = 'block';
    if (vig)  vig.style.display  = 'block';
    if (corn) corn.style.display = 'block';
    if (!running) initParticles();
  }

  window.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('resize',    function()  { if (running) { resize(); buildParticles(); } });
  window.NEXO_PARTICLES = { show: showLoginEffects, stop: stopParticles };

  // FIX: verifica estado inicial + observa mudanças futuras
  document.addEventListener('DOMContentLoaded', function() {
    var loginEl = document.getElementById('login-screen');
    if (!loginEl) return;

    // Dispara imediatamente se login já estiver visível ao carregar
    function checkAndShow() {
      var disp = loginEl.style.display || getComputedStyle(loginEl).display;
      if (disp === 'flex') showLoginEffects();
    }
    checkAndShow();

    // Também observa o momento em que auth.js mostra o login
    var obs = new MutationObserver(function() {
      var disp = loginEl.style.display;
      if (disp === 'flex') {
        showLoginEffects();
      } else if (disp === 'none') {
        stopParticles();
      }
    });
    obs.observe(loginEl, { attributes: true, attributeFilter: ['style'] });

    // Fallback: checa após 300ms (garante que auth.js já rodou)
    setTimeout(checkAndShow, 300);
    setTimeout(checkAndShow, 800);
  });
})();
</script>

<!-- Login form handler -->
<script>
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    var btnLogin = document.getElementById('btn-login');
    var errDiv   = document.getElementById('login-error');

    // Enter key em inputs
    ['login-email','login-senha'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') btnLogin.click();
      });
    });

    if (btnLogin) {
      btnLogin.addEventListener('click', async function() {
        var email = (document.getElementById('login-email').value || '').trim();
        var senha = document.getElementById('login-senha').value || '';
        if (!email || !senha) {
          errDiv.textContent = 'Preencha email e senha.';
          return;
        }
        errDiv.textContent = '';
        btnLogin.disabled = true;
        btnLogin.textContent = 'Entrando...';
        try {
          await window.NEXO.auth.login(email, senha);
          // auth.js chama requireAuth() e mostra o app-shell
        } catch (err) {
          errDiv.textContent = err.message || 'Erro ao entrar.';
          btnLogin.disabled = false;
          btnLogin.textContent = 'Entrar';
        }
      });
    }

    // Logout
    var btnLogout = document.getElementById('btn-logout');
    if (btnLogout) {
      btnLogout.addEventListener('click', function() {
        window.NEXO.auth.logout();
      });
    }

    // Preenche nome/role na sidebar após auth
    window.NEXO_UPDATE_USER = function(user) {
      if (!user) return;
      var meta = user.user_metadata || {};
      var av   = document.getElementById('sidebar-user-av');
      var nm   = document.getElementById('sidebar-user-name');
      var rl   = document.getElementById('sidebar-user-role');
      var nome = meta.nome || user.email || 'Usuário';
      if (av) av.textContent = nome.charAt(0).toUpperCase();
      if (nm) nm.textContent = nome;
      if (rl) rl.textContent = meta.role === 'super_admin' ? 'Super Admin' : 'Gestor de Rede';
    };
  });
})();
</script>

  <nav class="sidebar-nav">

      <a class="nav-item" data-page="copiloto"><span class="nav-icon">🧭</span> Copiloto</a>
      <a class="nav-item" data-page="onepage"><span class="nav-icon">🎯</span> OnePage</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">KPIs</div>
      <a class="nav-item" data-page="ruptura"><span class="nav-icon">📦</span> Ruptura</a>
      <a class="nav-item" data-page="quebra"><span class="nav-icon">💔</span> Quebra</a>

</aside>

<!-- HEADER -->
<header class="header">
  <div>
    <div class="header-title" id="headerTitle">NEXO Intelligence</div>
    <div class="header-sub" id="headerSub">Carregando...</div>
  </div>
  <div class="header-right">
    <div class="header-date" id="headerDate"></div>
    <div class="header-network" id="headerNetwork">Carregando...</div>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="main" id="mainContent">
  <div class="page-loading">Carregando dados...</div>
</main>

<!-- JS Modules -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/engine.js"></script>
<script src="js/charts.js"></script>
<script src="js/ui.js"></script>
<script src="js/router.js"></script>
<script src="pages/ruptura.js"></script>
<script src="pages/copiloto.js"></script>
<script src="pages/onepage.js"></script>

<script>
// ===== APP INIT =====
(async function() {
  // Header date
  const hoje = new Date();
  const diasSemana = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('headerDate').textContent =
    '📅 ' + diasSemana[hoje.getDay()] + ', ' + hoje.getDate() + ' ' + meses[hoje.getMonth()] + ' ' + hoje.getFullYear();

  // Init product map
  await Engine.buildProdMap();

  // Build loja map DIRECTLY from lojas table (redes may have RLS blocking anon)
  const lojas = await API.getLojas(); // sem filtro = todas
  if (lojas.length > 0) {
    lojas.forEach(function(l) { Engine._lojaMap[l.id] = l.nome; });
    document.getElementById('headerNetwork').textContent = lojas.length + ' lojas conectadas';
  } else {
    document.getElementById('headerNetwork').textContent = 'Sem lojas configuradas';
  }

  // Try to get rede name (optional — may fail due to RLS)
  try {
    const redes = await API.getRedes();
    if (redes.length > 0) {
      window.NEXO_REDE_ID = redes[0].id;
      document.getElementById('headerNetwork').textContent = redes[0].nome + ' — ' + lojas.length + ' lojas';
    }
  } catch(e) {
    console.log('[NEXO] Redes com RLS — usando lojas diretamente');
  }

  // Init router
  Router.init();
})();
</script>
</body>
</html>

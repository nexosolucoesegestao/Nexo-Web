<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXO Intelligence</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/web.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
</head>
<body>
    <!-- Login -->
    <div id="login-screen" style="display:none;">
        <div class="login-container">
            <div class="login-brand">
                <div class="login-logo">N</div>
                <h1>NEXO <span>Intelligence</span></h1>
                <p>Inteligência operacional na palma da mão</p>
            </div>
            <div class="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="login-senha" placeholder="••••••••">
                </div>
                <button class="btn btn-gold btn-block" id="btn-login">Entrar</button>
                <p id="login-error" class="login-error"></p>
            </div>
        </div>
    </div>

    <!-- App Shell -->
    <div id="app-shell" style="display:none;">
        <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">N</div>
                <div class="brand-text">
                    <span class="brand-name">NEXO</span>
                    <span class="brand-sub">Intelligence</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="section-label">Principal</div>
                    <a class="sidebar-link" data-route="copiloto" href="#/copiloto">
                        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2L12.5 7.5H18L13.5 11L15.5 17L10 13.5L4.5 17L6.5 11L2 7.5H7.5L10 2Z"/></svg>
                        Copiloto
                    </a>
                    <a class="sidebar-link" data-route="dashboard" href="#/dashboard">
                        <svg viewBox="0 0 20 20" fill="currentColor"><rect x="2" y="10" width="4" height="8" rx="1"/><rect x="8" y="6" width="4" height="12" rx="1"/><rect x="14" y="2" width="4" height="16" rx="1"/></svg>
                        Dashboard
                    </a>
                </div>
                <div class="sidebar-section">
                    <div class="section-label">Análise</div>
                    <a class="sidebar-link" data-route="operacional" href="#/operacional">
                        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 3h14v14H3V3zm2 2v10h10V5H5z"/><path d="M7 12h2v3H7zm4-4h2v7h-2z"/></svg>
                        Operacional
                    </a>
                    <a class="sidebar-link" data-route="mercado" href="#/mercado">
                        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 16l4-4 3 3 5-6 4 4V6h-4l2.5 2.5L9 13l-3-3-4 4v2z"/></svg>
                        Mercado
                    </a>
                    <a class="sidebar-link" data-route="financeiro" href="#/financeiro">
                        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm1 11H9v-1h2v1zm0-3H9V6h2v4z"/></svg>
                        Financeiro
                    </a>
                    <a class="sidebar-link" data-route="comparativo" href="#/comparativo">
                        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 3h6v6H3V3zm8 0h6v6h-6V3zM3 11h6v6H3v-6zm8 0h6v6h-6v-6z"/></svg>
                        Comparativo
                    </a>
                </div>
                <div class="sidebar-section" id="nav-filtro-rede" style="display:none;">
                    <div class="section-label">Filtro</div>
                    <select class="sidebar-select" id="filtro-rede">
                        <option value="">Todas as redes</option>
                    </select>
                    <select class="sidebar-select" id="filtro-loja">
                        <option value="">Todas as lojas</option>
                    </select>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <div>
                        <div class="user-name" id="user-name">Usuário</div>
                        <div class="user-role" id="user-role">Gestor</div>
                    </div>
                </div>
                <button class="btn-icon" id="btn-logout" title="Sair">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 3h8v2H5v10h6v2H3V3zm10 4l4 3-4 3V7zm-3 2h6v2h-6v-2z"/></svg>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <button class="menu-toggle" id="menu-toggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <h2 id="page-title">Copiloto</h2>
                <div class="header-right">
                    <span class="header-date" id="header-date"></span>
                </div>
            </header>
            <div class="page-content" id="page-container">
                <div class="loading-state"><div class="spinner"></div><span>Carregando...</span></div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

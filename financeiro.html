<!-- NEXO Intelligence Web — Financeiro -->

<div id="fin-area">
    <div class="loading-state"><div class="spinner"></div><span>Calculando impacto financeiro...</span></div>
</div>

<script>
window.initFinanceiro = async () => {
    const area = document.getElementById('fin-area');
    try {
        const filters = NEXO.getFilters();
        const data = await NEXO.api.loadAllData(30);
        const produtos = data.produtos;
        const prodMap = {}; produtos.forEach(p => prodMap[p.id] = p.corte || p.id);

        let disp = data.disponibilidade;
        let quebra = data.quebra;
        if (filters.lojaId) { disp = disp.filter(d => d.loja_id === filters.lojaId); quebra = quebra.filter(q => q.loja_id === filters.lojaId); }
        else if (filters.redeId) {
            const ids = data.lojas.filter(l => l.id_rede === filters.redeId).map(l => l.id);
            disp = disp.filter(d => ids.includes(d.loja_id)); quebra = quebra.filter(q => ids.includes(q.loja_id));
        }

        const n3 = NEXO.engine.analyzeFinancialImpact(quebra, disp, produtos);
        const quebraTotal = quebra.reduce((s, q) => s + (parseFloat(q.valor_estimado) || 0), 0);
        const pesoTotal = quebra.reduce((s, q) => s + (parseFloat(q.peso_kg) || 0), 0);
        const totalRupt = disp.filter(d => d.tem_estoque === 'NÃO').length;
        const PRECO_MEDIO = 42;
        const vendaPerdida = totalRupt * 2.5 * PRECO_MEDIO * 0.3;

        // ROI estimado
        const custoNexoMensal = 897;
        const economiaPotencial = (quebraTotal * 0.30) + (vendaPerdida * 0.25);
        const roi = custoNexoMensal > 0 ? Math.round((economiaPotencial / custoNexoMensal) * 100) : 0;

        area.innerHTML = `
        <div class="metrics-grid">
            <div class="metric-card danger">
                <div class="metric-label">Quebra total (30d)</div>
                <div class="metric-value">R$ ${Math.round(quebraTotal).toLocaleString('pt-BR')}</div>
                <div class="metric-sub">${quebra.length} ocorrências · ${pesoTotal.toFixed(1)} kg</div>
            </div>
            <div class="metric-card warning">
                <div class="metric-label">Venda perdida estimada</div>
                <div class="metric-value">R$ ${Math.round(vendaPerdida).toLocaleString('pt-BR')}</div>
                <div class="metric-sub">${totalRupt} rupturas × R$ ${PRECO_MEDIO}/kg médio</div>
            </div>
            <div class="metric-card info">
                <div class="metric-label">Impacto total</div>
                <div class="metric-value">R$ ${Math.round(quebraTotal + vendaPerdida).toLocaleString('pt-BR')}</div>
                <div class="metric-sub">Quebra + venda perdida no período</div>
            </div>
            <div class="metric-card success">
                <div class="metric-label">ROI NEXO estimado</div>
                <div class="metric-value">${roi}%</div>
                <div class="metric-sub">Economia potencial / Custo NEXO</div>
            </div>
        </div>

        <div class="chart-row">
            <div class="card">
                <div class="card-header"><h3>Quebra por motivo (R$)</h3></div>
                <div class="card-body"><canvas id="fin-motivo"></canvas></div>
            </div>
            <div class="card">
                <div class="card-header"><h3>Quebra por destino</h3></div>
                <div class="card-body"><canvas id="fin-destino"></canvas></div>
            </div>
        </div>

        <div class="card" style="margin-bottom:1rem;">
            <div class="card-header"><h3>Projeção de economia com NEXO</h3></div>
            <div class="card-body">
                <table class="data-table">
                    <thead><tr><th>Indicador</th><th>Atual (30d)</th><th>Meta NEXO (-30%)</th><th>Economia</th></tr></thead>
                    <tbody>
                        <tr><td>Quebra (R$)</td><td>R$ ${Math.round(quebraTotal).toLocaleString('pt-BR')}</td><td>R$ ${Math.round(quebraTotal * 0.7).toLocaleString('pt-BR')}</td><td style="color:var(--success);font-weight:600">R$ ${Math.round(quebraTotal * 0.3).toLocaleString('pt-BR')}</td></tr>
                        <tr><td>Venda perdida</td><td>R$ ${Math.round(vendaPerdida).toLocaleString('pt-BR')}</td><td>R$ ${Math.round(vendaPerdida * 0.75).toLocaleString('pt-BR')}</td><td style="color:var(--success);font-weight:600">R$ ${Math.round(vendaPerdida * 0.25).toLocaleString('pt-BR')}</td></tr>
                        <tr style="font-weight:600;border-top:2px solid var(--border)"><td>Total economia/mês</td><td></td><td></td><td style="color:var(--success)">R$ ${Math.round(economiaPotencial).toLocaleString('pt-BR')}</td></tr>
                        <tr><td>Custo NEXO/mês</td><td></td><td></td><td>R$ ${custoNexoMensal.toLocaleString('pt-BR')}</td></tr>
                        <tr style="font-weight:700;background:var(--success-bg)"><td>ROI</td><td></td><td></td><td style="color:var(--success)">${roi}%</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        ${n3.length > 0 ? `<div class="briefing-section">
            <div class="briefing-title"><span class="dot dot-danger"></span> Insights financeiros</div>
            ${n3.map(i => `<div class="insight-card ${i.severity}"><div class="insight-action">${i.acao}</div><div class="insight-meta">Motor N3 · ${i.type.replace(/_/g, ' ')}</div></div>`).join('')}
        </div>` : ''}`;

        // Charts
        const byMotivo = {};
        quebra.forEach(q => { const m = q.motivo || 'Não informado'; byMotivo[m] = (byMotivo[m] || 0) + (parseFloat(q.valor_estimado) || 0); });
        const mEntries = Object.entries(byMotivo).sort((a, b) => b[1] - a[1]);

        new Chart(document.getElementById('fin-motivo'), {
            type: 'bar',
            data: { labels: mEntries.map(([m]) => m), datasets: [{ data: mEntries.map(([, v]) => Math.round(v)), backgroundColor: '#fecaca', borderColor: '#dc2626', borderWidth: 1, borderRadius: 3 }] },
            options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false }, datalabels: { display: false } }, scales: { x: { ticks: { callback: v => 'R$' + v } } } }
        });

        const byDestino = {};
        quebra.forEach(q => { const d = q.destino || 'Não informado'; byDestino[d] = (byDestino[d] || 0) + 1; });
        const dEntries = Object.entries(byDestino);

        new Chart(document.getElementById('fin-destino'), {
            type: 'doughnut',
            data: { labels: dEntries.map(([d]) => d), datasets: [{ data: dEntries.map(([, v]) => v), backgroundColor: ['#fde68a','#fecaca','#bfdbfe','#bbf7d0','#e9d5ff'], borderWidth: 0 }] },
            options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } }, datalabels: { display: false } } }
        });

    } catch (err) {
        area.innerHTML = `<div class="error-state"><p>Erro.</p><p class="text-muted">${err.message}</p></div>`;
    }
};
</script>

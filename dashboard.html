<!-- NEXO Intelligence Web — Dashboard Executivo -->

<div id="dash-area">
    <div class="loading-state"><div class="spinner"></div><span>Carregando dashboard...</span></div>
</div>

<script>
window.initDashboard = async () => {
    const area = document.getElementById('dash-area');
    try {
        const filters = NEXO.getFilters();
        const data = await NEXO.api.loadAllData(30);
        let lojas = data.lojas;

        if (filters.redeId) {
            lojas = lojas.filter(l => l.id_rede === filters.redeId);
        }
        const lojaIds = lojas.map(l => l.id);

        const disp = data.disponibilidade.filter(d => lojaIds.includes(d.loja_id));
        const quebra = data.quebra.filter(q => lojaIds.includes(q.loja_id));
        const temp = data.temperatura.filter(t => lojaIds.includes(t.loja_id));
        const pres = data.presenca.filter(p => lojaIds.includes(p.loja_id));

        const sc = NEXO.engine.calculateScorecard(disp, quebra, temp, pres, filters.lojaId || null);
        const totalQuebra = quebra.reduce((s, q) => s + (parseFloat(q.valor_estimado) || 0), 0);
        const totalRupturas = disp.filter(d => d.tem_estoque === 'NÃO').length;

        area.innerHTML = `
        <div class="metrics-grid">
            <div class="metric-card info">
                <div class="metric-label">Score geral</div>
                <div class="metric-value">${sc.score}</div>
                <div class="metric-sub">de 100 pontos</div>
            </div>
            <div class="metric-card ${sc.ruptura.taxa > 15 ? 'danger' : sc.ruptura.taxa > 8 ? 'warning' : 'success'}">
                <div class="metric-label">Taxa de ruptura</div>
                <div class="metric-value">${sc.ruptura.taxa}%</div>
                <div class="metric-sub">${totalRupturas} rupturas em 30 dias</div>
            </div>
            <div class="metric-card ${totalQuebra > 2000 ? 'danger' : 'warning'}">
                <div class="metric-label">Quebra total</div>
                <div class="metric-value">R$ ${Math.round(totalQuebra).toLocaleString('pt-BR')}</div>
                <div class="metric-sub">${quebra.length} ocorrências</div>
            </div>
            <div class="metric-card ${sc.temperatura.conformidade < 90 ? 'danger' : 'success'}">
                <div class="metric-label">Temperatura OK</div>
                <div class="metric-value">${sc.temperatura.conformidade}%</div>
                <div class="metric-sub">${sc.temperatura.anomalias} anomalias</div>
            </div>
            <div class="metric-card ${sc.presenca.taxa < 80 ? 'warning' : 'success'}">
                <div class="metric-label">Presença equipe</div>
                <div class="metric-value">${sc.presenca.taxa}%</div>
                <div class="metric-sub">Média do período</div>
            </div>
        </div>

        <div class="chart-row">
            <div class="card">
                <div class="card-header"><h3>Ruptura por dia (30 dias)</h3></div>
                <div class="card-body"><div class="chart-container"><canvas id="chart-ruptura"></canvas></div></div>
            </div>
            <div class="card">
                <div class="card-header"><h3>Quebra acumulada (R$)</h3></div>
                <div class="card-body"><div class="chart-container"><canvas id="chart-quebra"></canvas></div></div>
            </div>
        </div>

        <div class="chart-row">
            <div class="card">
                <div class="card-header"><h3>Ruptura por produto (Top 10)</h3></div>
                <div class="card-body"><div class="chart-container"><canvas id="chart-prod-ruptura"></canvas></div></div>
            </div>
            <div class="card">
                <div class="card-header"><h3>Motivos de ruptura</h3></div>
                <div class="card-body"><div class="chart-container"><canvas id="chart-motivos"></canvas></div></div>
            </div>
        </div>

        <div class="card" style="margin-top:1rem;">
            <div class="card-header"><h3>Top 5 produtos com mais quebra (R$)</h3></div>
            <div class="card-body">
                <table class="data-table" id="table-quebra-prod"></table>
            </div>
        </div>`;

        // ── Chart: Ruptura por dia ──
        const dispByDate = NEXO.engine.groupBy(disp, 'data');
        const dates = Object.keys(dispByDate).sort();
        const rupturaByDate = dates.map(d => {
            const items = dispByDate[d];
            const rupt = items.filter(i => i.tem_estoque === 'NÃO').length;
            return NEXO.engine.pct(rupt, items.length);
        });
        const last30 = dates.slice(-30);
        const ruptLast30 = rupturaByDate.slice(-30);

        new Chart(document.getElementById('chart-ruptura'), {
            type: 'bar',
            data: {
                labels: last30.map(d => d.slice(5)),
                datasets: [{
                    label: '% Ruptura',
                    data: ruptLast30,
                    backgroundColor: ruptLast30.map(v => v > 15 ? '#fecaca' : v > 8 ? '#fde68a' : '#bbf7d0'),
                    borderColor: ruptLast30.map(v => v > 15 ? '#dc2626' : v > 8 ? '#d97706' : '#16a34a'),
                    borderWidth: 1, borderRadius: 3
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false }, datalabels: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => v + '%' } }, x: { ticks: { maxRotation: 45, font: { size: 10 } } } } }
        });

        // ── Chart: Quebra acumulada ──
        const quebraByDate = NEXO.engine.groupBy(quebra, 'data');
        const qDates = Object.keys(quebraByDate).sort().slice(-30);
        let acumulado = 0;
        const quebraAcum = qDates.map(d => {
            acumulado += quebraByDate[d].reduce((s, q) => s + (parseFloat(q.valor_estimado) || 0), 0);
            return Math.round(acumulado);
        });

        new Chart(document.getElementById('chart-quebra'), {
            type: 'line',
            data: {
                labels: qDates.map(d => d.slice(5)),
                datasets: [{ label: 'Acumulado R$', data: quebraAcum, borderColor: '#dc2626', backgroundColor: 'rgba(220,38,38,.08)', fill: true, tension: .3, pointRadius: 0 }]
            },
            options: { responsive: true, plugins: { legend: { display: false }, datalabels: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => 'R$' + v.toLocaleString('pt-BR') } }, x: { ticks: { maxRotation: 45, font: { size: 10 } } } } }
        });

        // ── Chart: Ruptura por produto ──
        const ruptByProd = {};
        disp.filter(d => d.tem_estoque === 'NÃO').forEach(d => { ruptByProd[d.produto_id] = (ruptByProd[d.produto_id] || 0) + 1; });
        const prodMap = {}; data.produtos.forEach(p => prodMap[p.id] = p.corte || p.id);
        const topProd = Object.entries(ruptByProd).sort((a, b) => b[1] - a[1]).slice(0, 10);

        new Chart(document.getElementById('chart-prod-ruptura'), {
            type: 'bar',
            data: {
                labels: topProd.map(([id]) => prodMap[id] || id),
                datasets: [{ label: 'Rupturas', data: topProd.map(([, v]) => v), backgroundColor: '#fecaca', borderColor: '#dc2626', borderWidth: 1, borderRadius: 3 }]
            },
            options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false }, datalabels: { display: false } }, scales: { x: { beginAtZero: true } } }
        });

        // ── Chart: Motivos de ruptura ──
        const motivos = {};
        disp.filter(d => d.tem_estoque === 'NÃO' && d.motivo_ruptura).forEach(d => { motivos[d.motivo_ruptura] = (motivos[d.motivo_ruptura] || 0) + 1; });
        const motivoEntries = Object.entries(motivos).sort((a, b) => b[1] - a[1]);

        new Chart(document.getElementById('chart-motivos'), {
            type: 'doughnut',
            data: {
                labels: motivoEntries.map(([m]) => m),
                datasets: [{ data: motivoEntries.map(([, v]) => v), backgroundColor: ['#fde68a','#fecaca','#bfdbfe','#bbf7d0','#e9d5ff'], borderWidth: 0 }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } }, datalabels: { display: false } } }
        });

        // ── Table: Top quebra por produto ──
        const quebraByProd = NEXO.engine.groupBy(quebra, 'produto_id');
        const topQuebra = Object.entries(quebraByProd).map(([id, recs]) => ({
            produto: prodMap[id] || id,
            valor: recs.reduce((s, r) => s + (parseFloat(r.valor_estimado) || 0), 0),
            peso: recs.reduce((s, r) => s + (parseFloat(r.peso_kg) || 0), 0),
            ocorrencias: recs.length
        })).sort((a, b) => b.valor - a.valor).slice(0, 5);

        const tableEl = document.getElementById('table-quebra-prod');
        tableEl.innerHTML = '<thead><tr><th>Produto</th><th>Valor (R$)</th><th>Peso (kg)</th><th>Ocorrências</th></tr></thead><tbody>' +
            topQuebra.map(q => `<tr><td style="font-weight:500">${q.produto}</td><td>R$ ${Math.round(q.valor).toLocaleString('pt-BR')}</td><td>${q.peso.toFixed(1)} kg</td><td>${q.ocorrencias}</td></tr>`).join('') +
            '</tbody>';

    } catch (err) {
        area.innerHTML = `<div class="error-state"><p>Erro ao carregar dashboard.</p><p class="text-muted">${err.message}</p></div>`;
        console.error(err);
    }
};
</script>
